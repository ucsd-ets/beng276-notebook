name: beng276        # The name of the environment
channels:                 # Order of priority for package search
  - conda-forge
  - defaults
dependencies:             # List of packages to install
  - openmm
  - cudatoolkit=11.2
  - seekr2_openmm_plugin
  - fenics-dolfinx
  - mpich
  - pyvista
  - pip:   
    - pdb2pqr               # Nested list for PyPI-only packages
    - mdtraj